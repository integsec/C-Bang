<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <!-- 1050x600 = 3.5x2 inches at 300dpi. Min readable font ~25px (6pt) -->
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="30%" style="stop-color:#12121a"/>
      <stop offset="60%" style="stop-color:#1a1030"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#22d3a0;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#22d3a0;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" fill="url(#heroGrad)"/>
  <rect width="1050" height="600" fill="url(#orb1)"/>
  <rect width="1050" height="600" fill="url(#orb2)"/>
  <rect width="1050" height="600" fill="url(#grid)"/>
  <rect x="8" y="8" width="1034" height="584" rx="14" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- What is C! — ~8pt -->
  <text x="525" y="62" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.55)">A language where security isn't an afterthought —</text>
  <text x="525" y="95" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.55)">it's built into the type system.</text>

  <!-- Three features: each ~100px tall, side by side -->
  <!-- Linear Types -->
  <rect x="50" y="125" width="300" height="175" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="200" y="162" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#a5b4fc">Linear Types</text>
  <text x="200" y="195" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">Zero-cost memory safety.</text>
  <text x="200" y="224" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">Resources used exactly once.</text>
  <text x="200" y="253" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">No GC, no runtime cost.</text>
  <text x="200" y="288" font-family="JetBrains Mono, Consolas, monospace" font-size="21" text-anchor="middle" fill="rgba(34,211,160,0.55)">token: own Token</text>

  <!-- Actor Model -->
  <rect x="375" y="125" width="300" height="175" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(34,211,160,0.2)" stroke-width="1"/>
  <text x="525" y="162" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#6ee7b7">Actor Model</text>
  <text x="525" y="195" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">Safe parallelism built in.</text>
  <text x="525" y="224" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">No data races, no deadlocks.</text>
  <text x="525" y="253" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">Message passing by design.</text>
  <text x="525" y="288" font-family="JetBrains Mono, Consolas, monospace" font-size="21" text-anchor="middle" fill="rgba(139,92,246,0.55)">actor Processor { }</text>

  <!-- Universal Deployment -->
  <rect x="700" y="125" width="300" height="175" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="850" y="162" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#c4b5fd">Multi-Target</text>
  <text x="850" y="195" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">Write once, run anywhere.</text>
  <text x="850" y="224" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">Native, WebAssembly,</text>
  <text x="850" y="253" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.5)">or EVM smart contracts.</text>
  <text x="850" y="288" font-family="JetBrains Mono, Consolas, monospace" font-size="21" text-anchor="middle" fill="rgba(77,124,255,0.55)">#[target(wasm, evm)]</text>

  <!-- AI Native row -->
  <rect x="50" y="320" width="950" height="72" rx="12" fill="rgba(34,211,160,0.04)" stroke="rgba(34,211,160,0.15)" stroke-width="1"/>
  <text x="525" y="353" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="28" text-anchor="middle" fill="#22d3a0">AI-Native: Intent Annotations</text>
  <text x="525" y="382" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.45)">Describe what code should do in plain English. AI agents verify and collaborate.</text>

  <!-- CTA -->
  <rect x="150" y="415" width="750" height="60" rx="30" fill="rgba(34,211,160,0.1)" stroke="rgba(34,211,160,0.35)" stroke-width="1"/>
  <text x="525" y="453" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#22d3a0">Pitch in some tokens. Let's build the future.</text>

  <!-- Stats -->
  <text x="250" y="518" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="36" text-anchor="middle" fill="#a5b4fc">33+</text>
  <text x="250" y="545" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.35)">Issues to Grab</text>

  <text x="525" y="518" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="36" text-anchor="middle" fill="#6ee7b7">151</text>
  <text x="525" y="545" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.35)">Tests Passing</text>

  <text x="800" y="518" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="36" text-anchor="middle" fill="#c4b5fd">100%</text>
  <text x="800" y="545" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.35)">Open Source</text>

  <!-- GitHub URL -->
  <text x="525" y="582" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.5)" letter-spacing="1">github.com/integsec/c-bang</text>
</svg>