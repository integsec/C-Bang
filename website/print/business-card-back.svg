<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="30%" style="stop-color:#12121a"/>
      <stop offset="60%" style="stop-color:#1a1030"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#22d3a0;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#22d3a0;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" fill="url(#heroGrad)"/>
  <rect width="1050" height="600" fill="url(#orb1)"/>
  <rect width="1050" height="600" fill="url(#orb2)"/>
  <rect width="1050" height="600" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="8" y="8" width="1034" height="584" rx="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Heading -->
  <text x="525" y="80" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.9)">Humans &amp; Agents Welcome</text>
  <rect x="462" y="95" width="126" height="2" rx="1" fill="#22d3a0" opacity="0.6"/>

  <!-- Feature 1: Linear Types -->
  <rect x="60" y="130" width="280" height="130" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
  <text x="200" y="162" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="15" text-anchor="middle" fill="#a5b4fc">Linear Types</text>
  <text x="200" y="185" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">Memory safety without garbage</text>
  <text x="200" y="200" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">collection. Use-after-free and</text>
  <text x="200" y="215" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">double-free bugs are impossible.</text>
  <text x="200" y="247" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="10" text-anchor="middle" fill="rgba(34,211,160,0.7)">token: own Token</text>

  <!-- Feature 2: Actor Model -->
  <rect x="385" y="130" width="280" height="130" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(34,211,160,0.2)" stroke-width="0.5"/>
  <text x="525" y="162" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="15" text-anchor="middle" fill="#6ee7b7">Actor Model</text>
  <text x="525" y="185" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">Safe concurrency without data</text>
  <text x="525" y="200" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">races. Actors communicate via</text>
  <text x="525" y="215" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">messages, never shared memory.</text>
  <text x="525" y="247" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="10" text-anchor="middle" fill="rgba(139,92,246,0.7)">actor PaymentProcessor { }</text>

  <!-- Feature 3: Universal Deploy -->
  <rect x="710" y="130" width="280" height="130" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(139,92,246,0.2)" stroke-width="0.5"/>
  <text x="850" y="162" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="15" text-anchor="middle" fill="#c4b5fd">Universal Deployment</text>
  <text x="850" y="185" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">One language, every target.</text>
  <text x="850" y="200" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">Compile to native binaries,</text>
  <text x="850" y="215" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.5)">WebAssembly, or EVM bytecode.</text>
  <text x="850" y="247" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="10" text-anchor="middle" fill="rgba(77,124,255,0.7)">#[target(wasm, evm, native)]</text>

  <!-- What is C! -->
  <text x="525" y="310" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="13" text-anchor="middle" fill="rgba(255,255,255,0.55)">C! is a new programming language designed from day one for</text>
  <text x="525" y="330" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="13" text-anchor="middle" fill="rgba(255,255,255,0.55)">humans and AI agents to build secure software together.</text>

  <!-- Call to action -->
  <rect x="300" y="365" width="450" height="50" rx="25" fill="rgba(34,211,160,0.1)" stroke="rgba(34,211,160,0.3)" stroke-width="0.75"/>
  <text x="525" y="396" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="16" text-anchor="middle" fill="#22d3a0">Pitch in some tokens. Let's build the future together.</text>

  <!-- Targets -->
  <text x="525" y="460" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.35)">Open Source  |  TypeScript Compiler  |  26 Issues Ready to Grab</text>

  <!-- URLs -->
  <text x="350" y="510" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">c-bang.integsec.com</text>
  <text x="700" y="510" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">github.com/integsec/c-bang</text>

  <!-- Bottom tagline -->
  <text x="525" y="560" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.2)" letter-spacing="3">OPEN SOURCE  ·  AI-NATIVE  ·  SECURE BY DESIGN</text>
</svg>