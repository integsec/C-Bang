<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="30%" style="stop-color:#12121a"/>
      <stop offset="60%" style="stop-color:#1a1030"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="20%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#22d3a0;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#22d3a0;stop-opacity:0"/>
    </radialGradient>
    <filter id="bangGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" fill="url(#heroGrad)"/>
  <rect width="1050" height="600" fill="url(#orb1)"/>
  <rect width="1050" height="600" fill="url(#orb2)"/>
  <rect width="1050" height="600" fill="url(#orb3)"/>
  <rect width="1050" height="600" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="8" y="8" width="1034" height="584" rx="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Logo -->
  <text x="470" y="240" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="120" letter-spacing="-3" text-anchor="end" fill="url(#logoGrad)">C</text>
  <text x="478" y="240" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="120" text-anchor="start" fill="#22d3a0" filter="url(#bangGlow)">!</text>

  <!-- Tagline -->
  <text x="525" y="290" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.95)">The AI-Native Programming Language</text>

  <!-- Subtitle -->
  <text x="525" y="322" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="500" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.45)">Security by Construction</text>

  <!-- Feature chips -->
  <rect x="200" y="358" width="130" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(99,102,241,0.3)" stroke-width="0.75"/>
  <text x="265" y="378" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle" fill="#a5b4fc">Linear Types</text>

  <rect x="345" y="358" width="130" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(34,211,160,0.3)" stroke-width="0.75"/>
  <text x="410" y="378" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle" fill="#6ee7b7">Actor Model</text>

  <rect x="490" y="358" width="180" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(139,92,246,0.3)" stroke-width="0.75"/>
  <text x="580" y="378" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle" fill="#c4b5fd">Universal Deployment</text>

  <!-- Code snippet -->
  <rect x="180" y="410" width="690" height="56" rx="8" fill="rgba(13,13,22,0.8)" stroke="rgba(42,42,62,0.5)" stroke-width="0.5"/>
  <text x="200" y="433" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#8b5cf6">fn</text>
  <text x="218" y="433" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#e8e8f0"> transfer(token: </text>
  <text x="356" y="433" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#22d3a0">own</text>
  <text x="380" y="433" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#e8e8f0"> Token, to: Address)</text>
  <text x="200" y="455" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#e8e8f0">    -> </text>
  <text x="237" y="455" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#a5b4fc">Result</text>
  <text x="280" y="455" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-weight="400" font-size="11" fill="#e8e8f0">&lt;Receipt, Error&gt;</text>

  <!-- URLs -->
  <text x="525" y="510" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">c-bang.integsec.com</text>
  <text x="525" y="535" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.3)">github.com/integsec/c-bang</text>
</svg>