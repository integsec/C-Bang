<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <!-- 1050x600 = 3.5x2 inches at 300dpi. Min readable font ~25px (6pt) -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="30%" style="stop-color:#12121a"/>
      <stop offset="60%" style="stop-color:#1a1030"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="bangGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" fill="url(#heroGrad)"/>
  <rect width="1050" height="600" fill="url(#orb1)"/>
  <rect width="1050" height="600" fill="url(#orb2)"/>
  <rect width="1050" height="600" fill="url(#grid)"/>
  <rect x="8" y="8" width="1034" height="584" rx="14" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo: big and centered -->
  <text x="458" y="168" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="150" letter-spacing="-4" text-anchor="end" fill="url(#logoGrad)">C</text>
  <text x="470" y="168" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="150" text-anchor="start" fill="#22d3a0" filter="url(#bangGlow)">!</text>

  <!-- Tagline: ~10pt -->
  <text x="525" y="220" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="42" text-anchor="middle" fill="rgba(255,255,255,0.95)">The AI-Native Programming Language</text>

  <!-- Subtitle: ~8pt -->
  <text x="525" y="260" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="500" font-size="30" text-anchor="middle" fill="rgba(255,255,255,0.45)">Security by Construction</text>

  <!-- Feature chips: ~7pt text -->
  <rect x="150" y="290" width="200" height="42" rx="21" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="250" y="317" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="26" text-anchor="middle" fill="#a5b4fc">Linear Types</text>

  <rect x="370" y="290" width="200" height="42" rx="21" fill="rgba(255,255,255,0.04)" stroke="rgba(34,211,160,0.3)" stroke-width="1"/>
  <text x="470" y="317" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="26" text-anchor="middle" fill="#6ee7b7">Actor Model</text>

  <rect x="590" y="290" width="310" height="42" rx="21" fill="rgba(255,255,255,0.04)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="745" y="317" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="26" text-anchor="middle" fill="#c4b5fd">Universal Deployment</text>

  <!-- Code snippet: ~6.5pt mono -->
  <rect x="80" y="355" width="890" height="80" rx="10" fill="rgba(13,13,22,0.85)" stroke="rgba(42,42,62,0.4)" stroke-width="1"/>
  <text x="105" y="388" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="25">
    <tspan fill="#8b5cf6">fn</tspan><tspan fill="#e8e8f0"> transfer(token: </tspan><tspan fill="#22d3a0">own</tspan><tspan fill="#e8e8f0"> Token, to: Address)</tspan>
  </text>
  <text x="105" y="420" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="25">
    <tspan fill="#e8e8f0">    -> </tspan><tspan fill="#a5b4fc">Result</tspan><tspan fill="#e8e8f0">&lt;Receipt, Error&gt; </tspan><tspan fill="#6a6a80">// moved, never copied</tspan>
  </text>

  <!-- CTA: ~7pt -->
  <text x="525" y="485" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#22d3a0">Humans &amp; Agents Welcome</text>

  <!-- URLs: ~8pt -->
  <text x="525" y="535" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">c-bang.integsec.com</text>

  <!-- Footer: ~6pt -->
  <text x="525" y="572" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.25)" letter-spacing="2">OPEN SOURCE  ·  AI-NATIVE  ·  SECURE BY DESIGN</text>
</svg>