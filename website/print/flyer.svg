<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" width="850" height="1100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="30%" style="stop-color:#12121a"/>
      <stop offset="60%" style="stop-color:#1a1030"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="15%" r="30%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="85%" r="30%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="25%">
      <stop offset="0%" style="stop-color:#22d3a0;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#22d3a0;stop-opacity:0"/>
    </radialGradient>
    <filter id="bangGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="850" height="1100" fill="url(#heroGrad)"/>
  <rect width="850" height="1100" fill="url(#orb1)"/>
  <rect width="850" height="1100" fill="url(#orb2)"/>
  <rect width="850" height="1100" fill="url(#orb3)"/>
  <rect width="850" height="1100" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="12" y="12" width="826" height="1076" rx="14" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Logo -->
  <text x="382" y="145" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="160" letter-spacing="-5" text-anchor="end" fill="url(#logoGrad)">C</text>
  <text x="394" y="145" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="800" font-size="160" text-anchor="start" fill="#22d3a0" filter="url(#bangGlow)">!</text>

  <!-- Tagline -->
  <text x="425" y="195" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="28" text-anchor="middle" fill="rgba(255,255,255,0.95)">The AI-Native Programming Language</text>
  <text x="425" y="225" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="500" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.45)">Security by Construction</text>

  <!-- Divider -->
  <rect x="375" y="248" width="100" height="2" rx="1" fill="#22d3a0" opacity="0.5"/>

  <!-- Description -->
  <text x="425" y="290" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="15" text-anchor="middle" fill="rgba(255,255,255,0.6)">A new programming language designed from day one for humans</text>
  <text x="425" y="312" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="15" text-anchor="middle" fill="rgba(255,255,255,0.6)">and AI agents to build secure software together. Where security</text>
  <text x="425" y="334" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="15" text-anchor="middle" fill="rgba(255,255,255,0.6)">isn't an afterthought — it's built into the type system.</text>

  <!-- Code example -->
  <rect x="75" y="365" width="700" height="140" rx="10" fill="rgba(13,13,22,0.9)" stroke="rgba(42,42,62,0.5)" stroke-width="0.75"/>
  <circle cx="97" cy="385" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="113" cy="385" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="129" cy="385" r="5" fill="#22d3a0" opacity="0.7"/>
  <text x="95" y="418" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12.5">
    <tspan fill="#8b5cf6">fn</tspan><tspan fill="#e8e8f0"> transfer(token: </tspan><tspan fill="#22d3a0">own</tspan><tspan fill="#e8e8f0"> Token, to: Address)</tspan>
  </text>
  <text x="95" y="440" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12.5">
    <tspan fill="#e8e8f0">    -> </tspan><tspan fill="#a5b4fc">Result</tspan><tspan fill="#e8e8f0">&lt;Receipt, Error&gt; {</tspan>
  </text>
  <text x="95" y="462" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12.5">
    <tspan fill="#6a6a80">    // token is moved, not copied — can't be spent twice</tspan>
  </text>
  <text x="95" y="484" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12.5">
    <tspan fill="#e8e8f0">    ledger.transfer(</tspan><tspan fill="#22d3a0">move</tspan><tspan fill="#e8e8f0"> token, to)</tspan>
  </text>
  <text x="95" y="496" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="12.5">
    <tspan fill="#e8e8f0">}</tspan>
  </text>

  <!-- Features section -->
  <!-- Linear Types -->
  <rect x="75" y="535" width="220" height="155" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(99,102,241,0.25)" stroke-width="0.75"/>
  <text x="185" y="570" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="17" text-anchor="middle" fill="#a5b4fc">Linear Types</text>
  <text x="185" y="596" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">Memory safety without</text>
  <text x="185" y="614" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">garbage collection.</text>
  <text x="185" y="638" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">Use-after-free and double-free</text>
  <text x="185" y="656" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">bugs are impossible by design.</text>
  <text x="185" y="680" font-family="JetBrains Mono, Consolas, monospace" font-size="10" text-anchor="middle" fill="rgba(34,211,160,0.6)">token: own Token</text>

  <!-- Actor Model -->
  <rect x="315" y="535" width="220" height="155" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(34,211,160,0.25)" stroke-width="0.75"/>
  <text x="425" y="570" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="17" text-anchor="middle" fill="#6ee7b7">Actor Model</text>
  <text x="425" y="596" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">Safe concurrency without</text>
  <text x="425" y="614" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">data races.</text>
  <text x="425" y="638" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">Actors communicate via messages,</text>
  <text x="425" y="656" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">never shared mutable state.</text>
  <text x="425" y="680" font-family="JetBrains Mono, Consolas, monospace" font-size="10" text-anchor="middle" fill="rgba(139,92,246,0.6)">actor PaymentProcessor { }</text>

  <!-- Universal Deployment -->
  <rect x="555" y="535" width="220" height="155" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(139,92,246,0.25)" stroke-width="0.75"/>
  <text x="665" y="570" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="17" text-anchor="middle" fill="#c4b5fd">Universal Deploy</text>
  <text x="665" y="596" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">One language, every target.</text>
  <text x="665" y="614" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)"> </text>
  <text x="665" y="638" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">Compile to native binaries,</text>
  <text x="665" y="656" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.5)">WebAssembly, or EVM bytecode.</text>
  <text x="665" y="680" font-family="JetBrains Mono, Consolas, monospace" font-size="10" text-anchor="middle" fill="rgba(77,124,255,0.6)">#[target(wasm, evm)]</text>

  <!-- AI section -->
  <rect x="75" y="720" width="700" height="80" rx="10" fill="rgba(34,211,160,0.04)" stroke="rgba(34,211,160,0.15)" stroke-width="0.5"/>
  <text x="425" y="752" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="16" text-anchor="middle" fill="#22d3a0">Built for AI Collaboration</text>
  <text x="425" y="778" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="13" text-anchor="middle" fill="rgba(255,255,255,0.5)">Intent annotations let AI agents understand and verify what your code should do.</text>
  <text x="425" y="796" font-family="JetBrains Mono, Consolas, monospace" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.35)">#[intent("Transfer token ownership, ensuring single-spend")]</text>

  <!-- Stats -->
  <text x="200" y="850" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#a5b4fc">26+</text>
  <text x="200" y="870" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.4)">Open Issues</text>

  <text x="425" y="850" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#6ee7b7">75</text>
  <text x="425" y="870" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.4)">Tests Passing</text>

  <text x="650" y="850" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="30" text-anchor="middle" fill="#c4b5fd">3</text>
  <text x="650" y="870" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="12" text-anchor="middle" fill="rgba(255,255,255,0.4)">Compile Targets</text>

  <!-- CTA -->
  <text x="425" y="930" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="22" text-anchor="middle" fill="rgba(255,255,255,0.9)">Humans &amp; Agents Welcome</text>
  <rect x="225" y="950" width="400" height="48" rx="24" fill="rgba(34,211,160,0.12)" stroke="rgba(34,211,160,0.4)" stroke-width="1"/>
  <text x="425" y="980" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="16" text-anchor="middle" fill="#22d3a0">Pitch in some tokens. Let's build the future together.</text>

  <!-- URLs -->
  <text x="425" y="1035" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="600" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">c-bang.integsec.com</text>
  <text x="425" y="1060" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.35)">github.com/integsec/c-bang</text>

  <!-- Bottom tagline -->
  <text x="425" y="1085" font-family="Inter, Segoe UI, system-ui, sans-serif" font-weight="400" font-size="9" text-anchor="middle" fill="rgba(255,255,255,0.15)" letter-spacing="3">OPEN SOURCE  ·  AI-NATIVE  ·  SECURE BY DESIGN</text>
</svg>